server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;

  # ========================
  # Serve Micro-Frontends
  # ========================
 location /admin/ {
  alias /usr/share/nginx/html/admin/;
  try_files $uri $uri/ /admin/index.html;
}

location /user/ {
  alias /usr/share/nginx/html/user/;
  try_files $uri $uri/ /user/index.html;
}

location /auth/ {
  alias /usr/share/nginx/html/auth/;
  try_files $uri $uri/ /auth/index.html;
}

location /shared/ {
  alias /usr/share/nginx/html/shared/;
  try_files $uri $uri/ /shared/index.html;
}

  # ========================
  # Shell (Main Host) Routing
  # ========================
  location / {
    try_files $uri $uri/ /index.html;
  }

  # ========================
  # CORS Headers - Applied Correctly
  # ========================
  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|ttf)$ {
    add_header 'Access-Control-Allow-Origin' '$http_origin' always;
    add_header 'Access-Control-Allow-Credentials' 'true' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'X-Requested-With, Content-Type, Authorization, Cookie' always;
  }

  # Fallback CORS for other files (like remoteEntry.js, index.html)
  add_header 'Access-Control-Allow-Origin' '$http_origin' always;
  add_header 'Access-Control-Allow-Credentials' 'true' always;
}